<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pengumpulan Laporan PKL (S1)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .form-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .form-header h2 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .form-header p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        
        .form-group input[type="text"],
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }
        
        .form-group input[type="text"]:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-group input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 2px dashed #e0e0e0;
            border-radius: 10px;
            background: #f8f9fa;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .form-group input[type="file"]:hover {
            border-color: #667eea;
            background: #f0f3ff;
        }
        
        .validation-message {
            font-size: 12px;
            margin-top: 5px;
            min-height: 20px;
        }
        
        .validation-message.error {
            color: #dc3545;
        }
        
        .validation-message.success {
            color: #28a745;
        }
        
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-submit:active {
            transform: translateY(0);
        }
        
        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .info-text {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
        }
        
        .loading.active {
            display: block;
        }
        
        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }
        
        .alert.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        @media (max-width: 480px) {
            .form-container {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <h2>📚 Form Pengumpulan Laporan PKL</h2>
            <p>Program Studi Ilmu Komunikasi (S1)</p>
        </div>
        
        <form id="pklForm" onsubmit="handleSubmit(event)">
            <!-- Nama Lengkap -->
            <div class="form-group">
                <label for="namaLengkap">Nama Lengkap</label>
                <input type="text" id="namaLengkap" name="namaLengkap" 
                       placeholder="Masukkan nama lengkap" required>
            </div>
            
            <!-- NIM dengan Validasi -->
            <div class="form-group">
                <label for="nim">NIM</label>
                <input type="text" id="nim" name="nim" 
                       placeholder="Contoh: 202241003" 
                       pattern="\d{9}"
                       maxlength="9"
                       required>
                <div class="validation-message" id="nimValidation"></div>
                <div class="info-text">Format: 4 digit tahun + 2 digit unik + 3 digit urut</div>
            </div>
            
            <!-- Konsentrasi -->
            <div class="form-group">
                <label for="konsentrasi">Konsentrasi</label>
                <select id="konsentrasi" name="konsentrasi" required>
                    <option value="">Pilih Konsentrasi</option>
                    <option value="Humas">Humas</option>
                    <option value="Periklanan">Periklanan</option>
                    <option value="Jurnalistik">Jurnalistik</option>
                    <option value="Penyiaran Digital">Penyiaran Digital</option>
                </select>
            </div>
            
            <!-- Upload Cover sampai Lembar Persetujuan -->
            <div class="form-group">
                <label for="fileCover">Upload File (Cover - Lembar Persetujuan)</label>
                <input type="file" id="fileCover" name="fileCover" 
                       accept=".pdf" required>
                <div class="info-text">Format PDF, maksimal 10MB</div>
            </div>
            
            <!-- Upload File Lengkap -->
            <div class="form-group">
                <label for="fileLengkap">Upload File Lengkap</label>
                <input type="file" id="fileLengkap" name="fileLengkap" 
                       accept=".pdf" required>
                <div class="info-text">Format PDF, maksimal 20MB</div>
            </div>
            
            <button type="submit" class="btn-submit" id="submitBtn">
                Submit Laporan
            </button>
        </form>
        
        <div class="loading" id="loading">
            ⏳ Sedang mengupload file...
        </div>
        
        <div class="alert" id="alertMessage"></div>
    </div>

    <script>
        // Fungsi untuk mendapatkan semester berdasarkan tanggal
        function getSemesterFolder() {
            const now = new Date();
            const month = now.getMonth(); // 0-11
            const year = now.getFullYear();
            
            let semester;
            if (month >= 8 && month <= 1) { // September - Februari
                semester = `Ganjil_${year}_${year + 1}`;
            } else { // Maret - Agustus
                semester = `Genap_${year - 1}_${year}`;
            }
            
            return semester;
        }
        
        // Fungsi untuk mendapatkan nama file yang sudah diformat
        function getFormattedFileName(nama, nim, originalFileName) {
            // Bersihkan nama dari karakter spesial
            const cleanNama = nama.replace(/[^a-zA-Z0-9]/g, '_').toLowerCase();
            const cleanNim = nim.trim();
            
            // Ambil ekstensi file
            const fileExt = originalFileName.split('.').pop();
            
            // Format: Nama=>NIM=>NamaFile
            return `${cleanNama}=>${cleanNim}=>${originalFileName.replace(/\.[^/.]+$/, '')}.${fileExt}`;
        }
        
        // Validasi NIM
        document.getElementById('nim').addEventListener('input', function(e) {
            const nim = e.target.value;
            const validationDiv = document.getElementById('nimValidation');
            
            // Reset validation
            validationDiv.className = 'validation-message';
            validationDiv.textContent = '';
            
            if (nim.length === 9) {
                // Validasi format: 4 digit tahun + 2 digit unik + 3 digit urut
                const yearPart = nim.substring(0, 4);
                const uniquePart = nim.substring(4, 6);
                const sequencePart = nim.substring(6, 9);
                
                // Validasi tahun (harus antara 2000-2099)
                const year = parseInt(yearPart);
                if (year < 2000 || year > 2099) {
                    validationDiv.className = 'validation-message error';
                    validationDiv.textContent = '❌ 4 digit pertama harus tahun valid (2000-2099)';
                    return;
                }
                
                // Validasi 2 digit unik (harus angka, tidak boleh 00)
                const unique = parseInt(uniquePart);
                if (isNaN(unique) || uniquePart === '00') {
                    validationDiv.className = 'validation-message error';
                    validationDiv.textContent = '❌ 2 digit unik tidak valid (tidak boleh 00)';
                    return;
                }
                
                // Validasi 3 digit urut (harus angka)
                const sequence = parseInt(sequencePart);
                if (isNaN(sequence) || sequence < 1) {
                    validationDiv.className = 'validation-message error';
                    validationDiv.textContent = '❌ 3 digit urut harus valid (001-999)';
                    return;
                }
                
                // Jika semua validasi lolos
                validationDiv.className = 'validation-message success';
                validationDiv.textContent = `✅ NIM valid: Tahun ${yearPart}, Unik ${uniquePart}, Urut ${sequencePart}`;
            } else if (nim.length > 0) {
                validationDiv.className = 'validation-message error';
                validationDiv.textContent = '❌ NIM harus 9 digit';
            }
        });
        
        // Fungsi untuk mengirim email (simulasi)
        function sendEmailNotification(nama, nim, konsentrasi, semester, fileNames) {
            const emailData = {
                to: `${nim}@student.university.ac.id`, // Email mahasiswa
                subject: `Laporan PKL - ${nama} - ${nim}`,
                body: `
                    Halo ${nama},
                    
                    Laporan PKL Anda telah berhasil diupload dengan detail:
                    
                    Nama: ${nama}
                    NIM: ${nim}
                    Konsentrasi: ${konsentrasi}
                    Semester: ${semester}
                    
                    File yang diupload:
                    1. ${fileNames.cover}
                    2. ${fileNames.lengkap}
                    
                    Terima kasih telah mengumpulkan laporan PKL.
                    
                    Salam,
                    Admin Fakultas Ilmu Komunikasi
                `
            };
            
            // Simulasi pengiriman email
            console.log('Mengirim email ke:', emailData.to);
            console.log('Subject:', emailData.subject);
            console.log('Body:', emailData.body);
            
            // Dalam implementasi nyata, ini akan menggunakan API email
            // Seperti SendGrid, Mailgun, atau backend service
            return new Promise((resolve) => {
                setTimeout(() => {
                    console.log('✅ Email terkirim ke:', emailData.to);
                    resolve(true);
                }, 1000);
            });
        }
        
        // Handle form submission
        async function handleSubmit(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const loadingDiv = document.getElementById('loading');
            const alertDiv = document.getElementById('alertMessage');
            
            // Disable button dan tampilkan loading
            submitBtn.disabled = true;
            loadingDiv.classList.add('active');
            alertDiv.className = 'alert';
            alertDiv.style.display = 'none';
            
            try {
                // Ambil data form
                const namaLengkap = document.getElementById('namaLengkap').value.trim();
                const nim = document.getElementById('nim').value.trim();
                const konsentrasi = document.getElementById('konsentrasi').value;
                const fileCover = document.getElementById('fileCover').files[0];
                const fileLengkap = document.getElementById('fileLengkap').files[0];
                
                // Validasi NIM
                const nimRegex = /^\d{9}$/;
                if (!nimRegex.test(nim)) {
                    throw new Error('NIM harus 9 digit');
                }
                
                // Validasi 2 digit unik
                const uniquePart = nim.substring(4, 6);
                if (uniquePart === '00' || isNaN(parseInt(uniquePart))) {
                    throw new Error('2 digit unik NIM tidak valid');
                }
                
                // Validasi file size
                const maxCoverSize = 10 * 1024 * 1024; // 10MB
                const maxLengkapSize = 20 * 1024 * 1024; // 20MB
                
                if (fileCover.size > maxCoverSize) {
                    throw new Error('File Cover melebihi batas 10MB');
                }
                
                if (fileLengkap.size > maxLengkapSize) {
                    throw new Error('File Lengkap melebihi batas 20MB');
                }
                
                // Dapatkan folder semester
                const semesterFolder = getSemesterFolder();
                
                // Format nama file
                const formattedCoverName = getFormattedFileName(namaLengkap, nim, fileCover.name);
                const formattedLengkapName = getFormattedFileName(namaLengkap, nim, fileLengkap.name);
                
                // Simulasi struktur folder dan upload
                const folderStructure = {
                    semester: semesterFolder,
                    files: {
                        cover: `uploads/${semesterFolder}/cover/${formattedCoverName}`,
                        lengkap: `uploads/${semesterFolder}/lengkap/${formattedLengkapName}`
                    }
                };
                
                console.log('📁 Struktur Folder:', folderStructure);
                console.log('📄 Upload File Cover:', formattedCoverName);
                console.log('📄 Upload File Lengkap:', formattedLengkapName);
                
                // Simulasi upload delay
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                // Kirim notifikasi email
                await sendEmailNotification(
                    namaLengkap, 
                    nim, 
                    konsentrasi, 
                    semesterFolder,
                    {
                        cover: formattedCoverName,
                        lengkap: formattedLengkapName
                    }
                );
                
                // Tampilkan pesan sukses
                alertDiv.className = 'alert success';
                alertDiv.style.display = 'block';
                alertDiv.innerHTML = `
                    ✅ <strong>Upload Berhasil!</strong><br>
                    Nama: ${namaLengkap}<br>
                    NIM: ${nim}<br>
                    Konsentrasi: ${konsentrasi}<br>
                    Semester: ${semesterFolder}<br>
                    File Cover: ${formattedCoverName}<br>
                    File Lengkap: ${formattedLengkapName}<br>
                    <small>✉️ Email notifikasi telah dikirim ke ${nim}@student.university.ac.id</small>
                `;
                
                // Reset form
                document.getElementById('pklForm').reset();
                document.getElementById('nimValidation').textContent = '';
                document.getElementById('nimValidation').className = 'validation-message';
                
            } catch (error) {
                alertDiv.className = 'alert error';
                alertDiv.style.display = 'block';
                alertDiv.textContent = `❌ Error: ${error.message}`;
            } finally {
                submitBtn.disabled = false;
                loadingDiv.classList.remove('active');
            }
        }
        
        // Preview semester folder saat halaman dimuat
        console.log('📅 Semester aktif:', getSemesterFolder());
        console.log('📂 Struktur folder akan dibuat:');
        console.log('  uploads/');
        console.log('    ├── Ganjil_2026_2027/ (September-Februari)');
        console.log('    │   ├── cover/');
        console.log('    │   └── lengkap/');
        console.log('    └── Genap_2025_2026/ (Maret-Agustus)');
        console.log('        ├── cover/');
        console.log('        └── lengkap/');
    </script>
</body>
</html>
